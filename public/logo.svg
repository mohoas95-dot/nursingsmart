<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="لوگوی نبض تپنده سامانه هوشمند برنامه‌ریزی شیفت پرستاری">
  <title>لوگوی نبض تپنده سامانه هوشمند برنامه‌ریزی شیفت پرستاری</title>
  <desc>نشان تیره با خط نبض قلب درخشان و کلفت زمردی-فیروزه‌ای؛ هویت سلامت‌تک و مانیتورینگ.</desc>

  <defs>
    <!-- بدنهٔ تیرهٔ نشان: نسخهٔ تیرهٔ همان امضای بصری (زمردی ۹۵۰ → فیروزه‌ای ۹۰۰ → نیلی ۹۵۰) -->
    <linearGradient id="dark" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#022c22"/>
      <stop offset="0.5" stop-color="#0f3d3e"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <!-- عمق صفحهٔ نمایش: تیره‌تر در گوشه‌ها -->
    <radialGradient id="vignette" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.30"/>
    </radialGradient>
    <!-- بازتاب نرم بالا -->
    <radialGradient id="sheen" cx="0.32" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- خط نبض درخشان: زمردی ۴۰۰ → فیروزه‌ای ۳۰۰ -->
    <linearGradient id="pulse" x1="84" y1="256" x2="428" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#5eead4"/>
    </linearGradient>
    <!-- هالهٔ نور نرم نبض -->
    <filter id="glow" x="-40%" y="-80%" width="180%" height="260%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- بدنهٔ نشان با گوشه‌های گرد هماهنگ با تم -->
  <rect x="16" y="16" width="480" height="480" rx="120" ry="120" fill="url(#dark)"/>
  <rect x="16" y="16" width="480" height="480" rx="120" ry="120" fill="url(#vignette)"/>
  <rect x="16" y="16" width="480" height="480" rx="120" ry="120" fill="url(#sheen)"/>
  <!-- قاب داخلی بسیار ظریف (حس بیزل صفحه) -->
  <rect x="17.5" y="17.5" width="477" height="477" rx="118.5" ry="118.5" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>

  <!-- هالهٔ نور وسیع و نرم خط نبض -->
  <path d="M84,256 L212,256 L240,150 L264,372 L292,256 L416,256"
        fill="none" stroke="#2dd4bf" stroke-opacity="0.40" stroke-width="30"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- خط نبض اصلی — کلفت‌تر -->
  <path d="M84,256 L212,256 L240,150 L264,372 L292,256 L416,256"
        fill="none" stroke="url(#pulse)" stroke-width="16"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- هستهٔ درخشان روی خط برای حس سه‌بعدی لاکچری -->
  <path d="M84,256 L212,256 L240,150 L264,372 L292,256 L416,256"
        fill="none" stroke="#ecfeff" stroke-opacity="0.55" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- نشانگر زندهٔ مانیتور در انتهای خط — لایه‌ای و ظریف -->
  <circle cx="416" cy="256" r="14" fill="none" stroke="#5eead4" stroke-opacity="0.40" stroke-width="1.75"/>
  <circle cx="416" cy="256" r="10" fill="#2dd4bf" fill-opacity="0.45" filter="url(#glow)"/>
  <circle cx="416" cy="256" r="6.5" fill="#5eead4"/>
  <circle cx="416" cy="256" r="3.5" fill="#ecfeff"/>
</svg>
