<svg viewBox="0 0 500 500" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="navy-grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0e2a52" />
      <stop offset="70%" stop-color="#05142b" />
      <stop offset="100%" stop-color="#020914" />
    </radialGradient>
    
    <!-- Gold Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE07D" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#9A7B1C" />
    </linearGradient>

    <!-- Wing Gradient -->
    <linearGradient id="wing-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8f9fa" />
      <stop offset="100%" stop-color="#d1d5db" />
    </linearGradient>
    
    <!-- Red Roundel Gradient -->
    <radialGradient id="red-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4d4d" />
      <stop offset="100%" stop-color="#b30000" />
    </radialGradient>

    <!-- Green Roundel Gradient -->
    <radialGradient id="green-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2ecc71" />
      <stop offset="100%" stop-color="#27ae60" />
    </radialGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Outer Braided Gold Rope Circle -->
  <circle cx="250" cy="250" r="235" fill="none" stroke="url(#gold-grad)" stroke-width="12" filter="url(#shadow)" />
  <circle cx="250" cy="250" r="238" fill="none" stroke="#9A7B1C" stroke-width="1.5" />
  <circle cx="250" cy="250" r="229" fill="none" stroke="#7A5D0F" stroke-width="1.5" />

  <!-- Braided rope ticks to simulate golden rope -->
  <g stroke="#7A5D0F" stroke-width="2.5" opacity="0.85">
    <!-- Generates a loop of line segments along the circle border -->
    <circle cx="250" cy="250" r="235" fill="none" stroke="url(#gold-grad)" stroke-width="8" stroke-dasharray="6,4" />
  </g>

  <!-- Inner Dark Blue Background -->
  <circle cx="250" cy="250" r="228" fill="url(#navy-grad)" />

  <!-- Golden Laurel / Wheat Branches (Laid out in arches along left & right) -->
  <g id="laurel-leaves" fill="url(#gold-grad)" filter="url(#shadow)">
    <!-- Left Leaf Arch -->
    <path d="M 125 350 C 75 290 85 180 145 110 M 145 110 C 148 115 152 125 145 135" stroke="url(#gold-grad)" stroke-width="2" fill="none" />
    <!-- Left individual leaf groupings -->
    <path d="M 130 325 C 110 315 112 295 130 305 Z" />
    <path d="M 120 300 C 100 290 102 270 120 280 Z" />
    <path d="M 114 270 C 94 260 96 240 114 250 Z" />
    <path d="M 112 240 C 92 230 94 210 112 220 Z" />
    <path d="M 115 210 C 95 200 97 180 115 190 Z" />
    <path d="M 120 180 C 100 170 102 150 120 160 Z" />
    <path d="M 128 150 C 108 140 112 120 130 132 Z" />
    <path d="M 140 124 C 122 114 128 94 144 108 Z" />

    <!-- Right Leaf Arch -->
    <path d="M 375 350 C 425 290 415 180 355 110 M 355 110 C 352 115 348 125 355 135" stroke="url(#gold-grad)" stroke-width="2" fill="none" />
    <!-- Right individual leaf groupings -->
    <path d="M 370 325 C 390 315 388 295 370 305 Z" />
    <path d="M 380 300 C 400 290 398 270 380 280 Z" />
    <path d="M 386 270 C 406 260 404 240 386 250 Z" />
    <path d="M 388 240 C 408 230 406 210 388 220 Z" />
    <path d="M 385 210 C 405 200 403 180 385 190 Z" />
    <path d="M 380 180 C 400 170 398 150 380 160 Z" />
    <path d="M 372 150 C 392 140 388 120 370 132 Z" />
    <path d="M 360 124 C 378 114 372 94 356 108 Z" />
  </g>

  <!-- Islamic Republic of Iran Emblem (Gold, top center) -->
  <g transform="translate(250, 100) scale(1)" fill="url(#gold-grad)" filter="url(#shadow)">
    <!-- Left Outer Crescent -->
    <path d="M -26 -16 C -26 -2 -16 6 -2 6 C -11 6 -18 -1 -18 -12 C -18 -16 -21 -20 -26 -16 Z" />
    <!-- Right Outer Crescent -->
    <path d="M 26 -16 C 26 -2 16 6 2 6 C 11 6 18 -1 18 -12 C 18 -16 21 -20 26 -16 Z" />
    <!-- Left Inner Crescent -->
    <path d="M -12 -24 C -12 -12 -4 0 0 0 C -4 0 -8 -8 -8 -20 C -8 -24 -10 -28 -12 -24 Z" />
    <!-- Right Inner Crescent -->
    <path d="M 12 -24 C 12 -12 4 0 0 0 C 4 0 8 -8 8 -20 C 8 -24 10 -28 12 -24 Z" />
    <!-- Central Sword / Blade -->
    <path d="M -1.5 -36 L 1.5 -36 L 1.5 4 L -1.5 4 Z" rx="0.5" />
    <!-- Top Tashdid / Accent symbol -->
    <path d="M -5 -36 C -3 -38 3 -38 5 -36 C 3 -34 -3 -34 -5 -36 Z" />
  </g>

  <!-- Large White Spread Wings (Symmetrical behind roundel) -->
  <g id="wings" filter="url(#shadow)">
    <!-- Left Wing (Layered detailed feathers) -->
    <!-- Base outline -->
    <path d="M 220 280 C 140 240, 60 210, 25 210 C 50 245, 110 300, 180 325 C 210 330, 222 300, 220 280" fill="url(#wing-grad)" stroke="#abb2bf" stroke-width="1" />
    <!-- Feathers top tier -->
    <path d="M 210 270 C 150 240, 90 220, 45 220 C 65 250, 120 295, 180 315 Z" fill="#ffffff" opacity="0.9" />
    <!-- Feathers middle tier -->
    <path d="M 200 280 C 160 255, 110 240, 75 240 C 90 265, 140 305, 185 315 Z" fill="#e5e7eb" />
    <!-- Feathers bottom tier -->
    <path d="M 190 290 C 160 275, 130 265, 105 265 C 115 285, 150 315, 180 320 Z" fill="#d1d5db" />
    <!-- Individual feather cuts for realistic look -->
    <path d="M210 280 L70 230 M200 290 L100 250 M190 300 L120 270" stroke="#9ca3af" stroke-width="0.75" />

    <!-- Right Wing (Layered detailed feathers, mirrored) -->
    <!-- Base outline -->
    <path d="M 280 280 C 360 240, 440 210, 475 210 C 450 245, 390 300, 320 325 C 290 330, 278 300, 280 280" fill="url(#wing-grad)" stroke="#abb2bf" stroke-width="1" />
    <!-- Feathers top tier -->
    <path d="M 290 270 C 350 240, 410 220, 455 220 C 435 250, 380 295, 320 315 Z" fill="#ffffff" opacity="0.9" />
    <!-- Feathers middle tier -->
    <path d="M 300 280 C 340 255, 390 240, 425 240 C 410 265, 360 305, 315 315 Z" fill="#e5e7eb" />
    <!-- Feathers bottom tier -->
    <path d="M 310 290 C 340 275, 370 265, 395 265 C 385 285, 350 315, 320 320 Z" fill="#d1d5db" />
    <!-- Individual feather cuts for realistic look -->
    <path d="M290 280 L430 230 M300 290 L400 250 M310 300 L380 270" stroke="#9ca3af" stroke-width="0.75" />
  </g>

  <!-- Golden Sunburst behind the Roundel (Stylized rays) -->
  <g id="sunburst" fill="url(#gold-grad)" opacity="0.95" filter="url(#shadow)">
    <path d="M 250 200 L 250 290 L 235 210 Z" />
    <path d="M 275 210 L 250 290 L 265 205 Z" />
    <path d="M 225 210 L 250 290 L 235 205 Z" />
    <path d="M 295 230 L 250 290 L 285 220 Z" />
    <path d="M 205 230 L 250 290 L 215 220 Z" />
    <path d="M 305 255 L 250 290 L 295 245 Z" />
    <path d="M 195 255 L 250 290 L 205 245 Z" />
  </g>

  <!-- Central Concentric IRIAF Roundel -->
  <g id="roundel" filter="url(#shadow)">
    <!-- Outer Green Circle -->
    <circle cx="250" cy="290" r="52" fill="url(#green-grad)" stroke="#1e7b43" stroke-width="1.5" />
    <!-- Middle White Circle -->
    <circle cx="250" cy="290" r="37" fill="#ffffff" stroke="#d1d5db" stroke-width="1" />
    <!-- Inner Red Circle -->
    <circle cx="250" cy="290" r="22" fill="url(#red-grad)" stroke="#990000" stroke-width="1" />
  </g>

  <!-- Elegant White Ribbon/Banner at the Bottom -->
  <g id="banner" filter="url(#shadow)">
    <!-- Ribbon background in pure white with gold borders -->
    <path d="M 90 380 C 150 335, 350 335, 410 380 C 435 410, 395 450, 360 445 C 290 435, 210 435, 140 445 C 105 450, 65 410, 90 380 Z" fill="#ffffff" stroke="url(#gold-grad)" stroke-width="3" />
    
    <!-- Ribbon inner shadow/border detail -->
    <path d="M 98 387 C 153 347, 347 347, 402 387" fill="none" stroke="#e5e7eb" stroke-width="1.5" />
    
    <!-- Calligraphic Callout Text -->
    <text x="250" y="418" font-family="Vazirmatn, system-ui, sans-serif" font-size="16" font-weight="900" fill="#001F4D" text-anchor="middle" direction="rtl" letter-spacing="0.5">
      نیروی هوایی ارتش جمهوری اسلامی ایران
    </text>
    <text x="250" y="434" font-family="Vazirmatn, system-ui, sans-serif" font-size="10" font-weight="700" fill="#9A7B1C" text-anchor="middle" direction="rtl">
      بیمارستان بعثت نهاجا
    </text>
  </g>
</svg>
